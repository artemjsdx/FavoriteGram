name: Build FavoriteGram APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:

  ffmpeg:
    name: Native Build (FFmpeg + libvpx)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Clone Nagram
        run: |
          git clone --depth=1 https://github.com/NextAlone/Nagram.git nagram
          cd nagram && sed -i "s/\/\///g" settings.gradle || true

      - name: Init ffmpeg + libvpx submodules
        run: cd nagram && git submodule update --init --depth=1 TMessagesProj/jni/ffmpeg TMessagesProj/jni/libvpx

      - name: Cache native libs
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: |
            nagram/TMessagesProj/jni/ffmpeg/build
            nagram/TMessagesProj/jni/libvpx/build
          key: ffmpeg-v2-${{ hashFiles('nagram/TMessagesProj/jni/build_ffmpeg_clang.sh', 'nagram/TMessagesProj/jni/build_libvpx_clang.sh') }}

      - uses: actions/setup-java@v4
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        with:
          java-version: "17"
          distribution: temurin

      - name: Setup Android SDK + NDK
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: |
          SDKROOT=/usr/local/lib/android/sdk
          SDKMGR="$SDKROOT/cmdline-tools/latest/bin/sdkmanager"
          echo "y" | "$SDKMGR" --install "ndk;21.4.7075529" > /dev/null
          echo "sdk.dir=$SDKROOT" > nagram/local.properties
          echo "ndk.dir=$SDKROOT/ndk/21.4.7075529" >> nagram/local.properties
          echo "ANDROID_HOME=$SDKROOT" >> $GITHUB_ENV
          echo "NDK_HOME=$SDKROOT/ndk/21.4.7075529" >> $GITHUB_ENV

      - name: Build FFmpeg + libvpx
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: |
          cd nagram
          chmod +x ./run
          ./run init action ffmpeg
          ./run init libs libvpx
          ./run init libs ffmpeg

  boringssl:
    name: Native Build (BoringSSL)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Clone Nagram
        run: |
          git clone --depth=1 https://github.com/NextAlone/Nagram.git nagram

      - name: Init boringssl submodule
        run: cd nagram && git submodule update --init --depth=1 TMessagesProj/jni/boringssl

      - name: Cache BoringSSL
        id: cache-boringssl
        uses: actions/cache@v4
        with:
          path: nagram/TMessagesProj/jni/boringssl/build
          key: boringssl-v2-${{ hashFiles('nagram/TMessagesProj/jni/build_boringssl.sh') }}

      - uses: actions/setup-java@v4
        if: steps.cache-boringssl.outputs.cache-hit != 'true'
        with:
          java-version: "17"
          distribution: temurin

      - name: Setup Android SDK + NDK
        if: steps.cache-boringssl.outputs.cache-hit != 'true'
        run: |
          SDKROOT=/usr/local/lib/android/sdk
          SDKMGR="$SDKROOT/cmdline-tools/latest/bin/sdkmanager"
          echo "y" | "$SDKMGR" --install "ndk;21.4.7075529" > /dev/null
          echo "sdk.dir=$SDKROOT" > nagram/local.properties
          echo "ndk.dir=$SDKROOT/ndk/21.4.7075529" >> nagram/local.properties
          sudo apt-get install -y cmake ninja-build

      - name: Build BoringSSL
        if: steps.cache-boringssl.outputs.cache-hit != 'true'
        run: |
          cd nagram
          chmod +x ./run
          ./run init action boringssl

  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: [ffmpeg, boringssl]
    steps:
      - uses: actions/checkout@v4

      - name: Clone Nagram
        run: |
          git clone --depth=1 https://github.com/NextAlone/Nagram.git nagram
          cd nagram && sed -i "s/\/\///g" settings.gradle || true

      - name: Init all submodules
        run: cd nagram && git submodule update --init --recursive --depth=1

      - name: Restore FFmpeg cache
        uses: actions/cache@v4
        with:
          path: |
            nagram/TMessagesProj/jni/ffmpeg/build
            nagram/TMessagesProj/jni/libvpx/build
          key: ffmpeg-v2-${{ hashFiles('nagram/TMessagesProj/jni/build_ffmpeg_clang.sh', 'nagram/TMessagesProj/jni/build_libvpx_clang.sh') }}

      - name: Restore BoringSSL cache
        uses: actions/cache@v4
        with:
          path: nagram/TMessagesProj/jni/boringssl/build
          key: boringssl-v2-${{ hashFiles('nagram/TMessagesProj/jni/build_boringssl.sh') }}

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - name: Setup Android SDK + NDK
        run: |
          SDKROOT=/usr/local/lib/android/sdk
          SDKMGR="$SDKROOT/cmdline-tools/latest/bin/sdkmanager"
          echo "y" | "$SDKMGR" --install "ndk;21.4.7075529" > /dev/null
          echo "sdk.dir=$SDKROOT" > nagram/local.properties
          echo "ndk.dir=$SDKROOT/ndk/21.4.7075529" >> nagram/local.properties
          echo "MAPS_API_KEY=AIzaFakeKeyForDebug" >> nagram/local.properties
          cat nagram/local.properties

      - run: sudo apt-get install -y imagemagick

      - name: Copy patch files
        run: |
          cp icon.jpg nagram/icon.jpg
          cp patches/apply_patches.py nagram/apply_patches.py
          cp patches/SessionImportHelper.java nagram/SessionImportHelper.java
          cp patches/SessionFormatPickerBottomSheet.java nagram/SessionFormatPickerBottomSheet.java

      - name: Apply patches
        run: cd nagram && python3 apply_patches.py

      - name: Replace icons
        run: |
          cd nagram
          BASE=TMessagesProj/src/main/res
          for D_SIZE in "mipmap-mdpi:48" "mipmap-hdpi:72" "mipmap-xhdpi:96" "mipmap-xxhdpi:144" "mipmap-xxxhdpi:192"; do
            D=${D_SIZE%%:*} ; S=${D_SIZE##*:}
            for F in "$BASE/$D"/ic_launcher*.png; do
              [ -f "$F" ] && convert icon.jpg -resize "${S}x${S}^" -gravity center -extent "${S}x${S}" "$F" && echo "OK: $F" || true
            done
          done

      - run: chmod +x nagram/gradlew

      - name: Build Debug APK
        run: |
          cd nagram
          ./gradlew :TMessagesProj_App:assembleDebug --no-daemon --stacktrace -x lint -x lintDebug -x test

      - name: Find APKs
        run: find nagram -name "*.apk"

      - uses: actions/upload-artifact@v4
        with:
          name: FavoriteGram-debug
          path: nagram/**/outputs/apk/**/*.apk
          if-no-files-found: error
          retention-days: 30