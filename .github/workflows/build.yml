name: Build FavoriteGram APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:

  # ── Stage 1: Build FFmpeg + libvpx native libs ──────────────────────────
  ffmpeg:
    name: Native Build (FFmpeg + libvpx)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone Nagram
        run: |
          git clone --depth=1 https://github.com/NextAlone/Nagram.git nagram
          cd nagram
          sed -i "s/\/\///g" settings.gradle || true

      - name: Init ffmpeg + libvpx submodules
        run: |
          cd nagram
          git submodule update --init --depth=1 TMessagesProj/jni/ffmpeg TMessagesProj/jni/libvpx

      - name: Cache ffmpeg + libvpx build
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: |
            nagram/TMessagesProj/jni/ffmpeg/build
            nagram/TMessagesProj/jni/libvpx/build
          key: ffmpeg-libvpx-v1-${{ hashFiles('nagram/TMessagesProj/jni/build_ffmpeg_clang.sh', 'nagram/TMessagesProj/jni/build_libvpx_clang.sh') }}

      - name: Setup Java
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - name: Install NDK
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: |
          echo "y" | sdkmanager --install "ndk;21.4.7075529" --sdk_root=${ANDROID_SDK_ROOT} > /dev/null
          echo "sdk.dir=${ANDROID_HOME}" > nagram/local.properties
          echo "ndk.dir=${ANDROID_HOME}/ndk/21.4.7075529" >> nagram/local.properties

      - name: Build FFmpeg + libvpx
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: |
          cd nagram
          chmod +x ./run
          ./run init action ffmpeg
          ./run init libs libvpx
          ./run init libs ffmpeg

  # ── Stage 2: Build BoringSSL ────────────────────────────────────────────
  boringssl:
    name: Native Build (BoringSSL)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone Nagram
        run: |
          git clone --depth=1 https://github.com/NextAlone/Nagram.git nagram

      - name: Init boringssl submodule
        run: |
          cd nagram
          git submodule update --init --depth=1 TMessagesProj/jni/boringssl

      - name: Cache BoringSSL build
        id: cache-boringssl
        uses: actions/cache@v4
        with:
          path: nagram/TMessagesProj/jni/boringssl/build
          key: boringssl-v1-${{ hashFiles('nagram/TMessagesProj/jni/build_boringssl.sh') }}

      - name: Setup Java
        if: steps.cache-boringssl.outputs.cache-hit != 'true'
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - name: Install NDK
        if: steps.cache-boringssl.outputs.cache-hit != 'true'
        run: |
          echo "y" | sdkmanager --install "ndk;21.4.7075529" --sdk_root=${ANDROID_SDK_ROOT} > /dev/null
          echo "sdk.dir=${ANDROID_HOME}" > nagram/local.properties
          echo "ndk.dir=${ANDROID_HOME}/ndk/21.4.7075529" >> nagram/local.properties

      - name: Build BoringSSL
        if: steps.cache-boringssl.outputs.cache-hit != 'true'
        run: |
          sudo apt-get install -y cmake ninja-build
          cd nagram
          chmod +x ./run
          ./run init action boringssl

  # ── Stage 3: Apply patches + Build APK ──────────────────────────────────
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: [ffmpeg, boringssl]
    steps:
      - name: Checkout FavoriteGram
        uses: actions/checkout@v4

      - name: Clone Nagram
        run: |
          git clone --depth=1 https://github.com/NextAlone/Nagram.git nagram
          cd nagram
          sed -i "s/\/\///g" settings.gradle || true

      - name: Init all submodules
        run: |
          cd nagram
          git submodule update --init --recursive --depth=1

      - name: Restore FFmpeg cache
        uses: actions/cache@v4
        with:
          path: |
            nagram/TMessagesProj/jni/ffmpeg/build
            nagram/TMessagesProj/jni/libvpx/build
          key: ffmpeg-libvpx-v1-${{ hashFiles('nagram/TMessagesProj/jni/build_ffmpeg_clang.sh', 'nagram/TMessagesProj/jni/build_libvpx_clang.sh') }}

      - name: Restore BoringSSL cache
        uses: actions/cache@v4
        with:
          path: nagram/TMessagesProj/jni/boringssl/build
          key: boringssl-v1-${{ hashFiles('nagram/TMessagesProj/jni/build_boringssl.sh') }}

      - name: Check native libs exist
        run: |
          ls nagram/TMessagesProj/jni/ffmpeg/build/arm64-v8a/lib/ 2>/dev/null || echo "WARNING: ffmpeg arm64 libs missing"
          ls nagram/TMessagesProj/jni/boringssl/build/ 2>/dev/null || echo "WARNING: boringssl build missing"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - name: Install NDK
        run: |
          echo "y" | sdkmanager --install "ndk;21.4.7075529" --sdk_root=${ANDROID_SDK_ROOT} > /dev/null
          echo "sdk.dir=${ANDROID_HOME}" > nagram/local.properties
          echo "ndk.dir=${ANDROID_HOME}/ndk/21.4.7075529" >> nagram/local.properties
          echo "MAPS_API_KEY=AIzaFakeKeyForDebug" >> nagram/local.properties
          cat nagram/local.properties

      - name: Install ImageMagick
        run: sudo apt-get install -y imagemagick

      - name: Copy patch files
        run: |
          cp icon.jpg nagram/icon.jpg
          cp patches/apply_patches.py nagram/apply_patches.py
          cp patches/SessionImportHelper.java nagram/SessionImportHelper.java
          cp patches/SessionFormatPickerBottomSheet.java nagram/SessionFormatPickerBottomSheet.java

      - name: Apply patches
        run: cd nagram && python3 apply_patches.py

      - name: Replace icons
        run: |
          cd nagram
          BASE=TMessagesProj/src/main/res
          for D_SIZE in "mipmap-mdpi:48" "mipmap-hdpi:72" "mipmap-xhdpi:96" "mipmap-xxhdpi:144" "mipmap-xxxhdpi:192"; do
            D=${D_SIZE%%:*}
            S=${D_SIZE##*:}
            for F in "$BASE/$D"/ic_launcher*.png; do
              [ -f "$F" ] || continue
              convert icon.jpg -resize "${S}x${S}^" -gravity center -extent "${S}x${S}" "$F" && echo "OK: $F" || true
            done
          done

      - name: Make gradlew executable
        run: chmod +x nagram/gradlew

      - name: Build Debug APK
        run: |
          cd nagram
          ./gradlew :TMessagesProj_App:assembleDebug --no-daemon --stacktrace -x lint -x lintDebug -x test

      - name: Find APKs
        run: find nagram -name "*.apk" 2>/dev/null

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FavoriteGram-debug
          path: nagram/**/outputs/apk/**/*.apk
          if-no-files-found: error
          retention-days: 30